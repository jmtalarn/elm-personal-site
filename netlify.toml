[build]
  functions = "functions/"
  publish = "dist/"
  command = "mkdir -p $NETLIFY_BUILD_BASE/cache/elm && export ELM_HOME="$NETLIFY_BUILD_BASE/cache/elm" && npm ci && npm run build"

[dev]
  command = "npm start"
  targetPort = 1234
  autoLaunch = true
  framework = "#custom"

[functions]
  node_bundler = "esbuild"
